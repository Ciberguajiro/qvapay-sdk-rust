name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'  # Se activa cuando se pushea un tag que empieza con 'v' (ej: v1.0.0, v0.2.3)

jobs:
  publish:
    name: Publish Rust crate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Check package
        run: cargo package 

      - name: Publish to crates.io
        run: cargo publish 
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}